version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: autobuses-mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./scripts/init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
      - ./scripts/data:/docker-entrypoint-initdb.d/data:ro  # <-- NUEVO
    command: mongod --bind_ip_all

  app:
    build: .
    container_name: autobuses-app
    restart: always
    ports:
      - "8000:8000"
    depends_on:
      - mongodb
    volumes:
      - ./certificates:/app/certificates:ro
      - ./backend:/app/backend
      - ./frontend:/app/frontend
      - ./uploads:/app/uploads
    environment:
      - MONGODB_URL=mongodb://mongodb:27017
      - PYTHONPATH=/app

volumes:
  mongodb_data: