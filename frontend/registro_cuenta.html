<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Cuenta - Pasajero</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" href="https://cdn-icons-png.freepik.com/512/10867/10867366.png">
    <link rel="stylesheet" href="css/inicio_sesion.css"> 
    <script src="js/config_global.js"></script>
</head>
<body>

    <div class="login-container">
        <div class="card login-card shadow-lg">
            <div class="card-body">
                <h2 class="card-title text-center mb-4">
                    <i class="bi bi-person-plus-fill bus-icon"></i>
                    Crear Cuenta
                </h2>

                <form>
                    <div class="mb-4 input-group input-group-lg"> 
                        <span class="input-group-text"><i class="bi bi-person"></i></span>
                        <input type="text" class="form-control" id="nombre" placeholder="Nombre completo" required>
                    </div>

                    <div class="mb-4 input-group input-group-lg"> 
                        <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                        <input type="email" class="form-control" id="email" placeholder="Correo electrónico" required>
                    </div>
                    
                    <div class="mb-4 input-group input-group-lg"> 
                        <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                        <input type="password" class="form-control" id="password" placeholder="Contraseña (mín. 8 caracteres)" required>
                        <span class="input-group-text password-toggle" id="togglePassword">
                            <i class="bi bi-eye-slash-fill"></i>
                        </span>
                    </div>
                    
                    <div class="mb-4 input-group input-group-lg"> 
                        <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                        <input type="password" class="form-control" id="confirm_password" placeholder="Confirmar contraseña" required>
                        <span class="input-group-text password-toggle" id="toggleConfirmPassword">
                            <i class="bi bi-eye-slash-fill"></i>
                        </span>
                    </div>
                    
                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-login btn-lg"> 
                            Registrarse
                            <i class="bi bi-check-circle-fill"></i>
                        </button>
                    </div>
                    
                    <div class="text-center mt-3">
                        <a href="inicio_sesion.html" class="forgot-link">Volver al inicio de sesión</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <script src="js/registro_cuenta.js"></script>
</body>
</html>
