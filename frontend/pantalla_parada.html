<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TUCSA - Pantalla de Parada</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="icon" href="https://cdn-icons-png.freepik.com/512/10867/10867366.png">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="css/pantalla_parada.css">
    <script src="js/config_global.js"></script>
</head>
<body>
    <div class="container-fluid pantalla-container">
        <header class="text-center mb-3">
            <h1 class="display-5 fw-bold text-primary mb-1">
                <i class="fa-solid fa-bus-simple me-2"></i>TUCSA
            </h1>
            <h2 class="text-muted mb-1" id="nombre-parada">Parada Centro</h2>
            <div class="last-update">
                <small class="text-muted" id="ultima-actualizacion">Actualizado: --:--:--</small>
            </div>
        </header>

        <!-- Información de la parada -->
        <div class="row mb-3">
            <div class="col-12">
                <div class="card">
                    <div class="card-body py-2 text-center">
                        <div class="row align-items-center">
                            <div class="col-md-8">
                                <h5 class="mb-0" id="info-parada">Mostrando los 5 camiones más cercanos de todas las rutas</h5>
                            </div>
                            <div class="col-md-4">
                                <div class="badge bg-success" id="estado-ruta">
                                    <i class="fa-solid fa-signal me-1"></i> En tiempo real
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row g-3">
            <!-- Columna de tiempos estimados -->
            <div class="col-12 col-lg-4">
                <div class="card pantalla-card h-100">
                    <div class="card-header bg-primary text-white py-2">
                        <h4 class="card-title mb-0">
                            <i class="fa-solid fa-clock me-2"></i>
                            Próximos 5 Camiones
                        </h4>
                    </div>
                    <div class="card-body p-0" id="tiempos-container">
                        <div class="text-center py-4">
                            <i class="fa-solid fa-spinner fa-spin fa-2x text-muted mb-2"></i>
                            <p class="text-muted small">Cargando información en tiempo real...</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Columna del mapa -->
            <div class="col-12 col-lg-8">
                <div class="card pantalla-card h-100">
                    <div class="card-header bg-primary text-white py-2">
                        <h4 class="card-title mb-0">
                            <i class="fa-solid fa-map-location-dot me-2"></i>
                            Mapa en Tiempo Real
                        </h4>
                    </div>
                    <div class="card-body p-0">
                        <div id="mapa-parada" class="mapa-parada"></div>
                    </div>
                </div>
            </div>
        </div>

        <footer class="text-center mt-3">
            <p class="text-muted mb-0">
                <small>Sistema de Información en Tiempo Real - TUCSA</small>
            </p>
        </footer>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/pantalla_parada.js"></script>
</body>
</html>
