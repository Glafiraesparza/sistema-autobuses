<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de Sesión - Personal TUCSA</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="icon" href="https://cdn-icons-png.freepik.com/512/10867/10867366.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/inicio_sesion_TUCSA.css"> 
    <script src="js/config_global.js"></script>
</head>
<body>

    <div class="login-container">
        <div class="card login-card shadow-lg">
            <div class="card-body">
                <h2 class="card-title text-center mb-3">
                    <i class="bi bi-bus-front-fill bus-icon"></i>
                    Personal TUCSA
                </h2>
                <p class="text-center text-muted mb-4">Selecciona tu rol</p>

                <!-- Selector de Rol -->
                <div class="role-selector mb-4">
                    <div class="row g-3">
                        <div class="col-6">
                            <input type="radio" class="btn-check" name="role" id="chofer" value="chofer" autocomplete="off" required>
                            <label class="role-option-card" for="chofer">
                                <div class="role-icon-container">
                                    <i class="bi bi-person-badge"></i>
                                </div>
                                <span class="role-text">Chofer</span>
                            </label>
                        </div>
                        <div class="col-6">
                            <input type="radio" class="btn-check" name="role" id="administrador" value="administrador" autocomplete="off" required>
                            <label class="role-option-card" for="administrador">
                                <div class="role-icon-container">
                                    <i class="bi bi-person-gear"></i>
                                </div>
                                <span class="role-text">Administrador</span>
                            </label>
                        </div>
                    </div>
                </div>

                <!-- 🔥 CAMBIO IMPORTANTE: Agregar id="loginForm" -->
                <form id="loginForm">
                    <div class="mb-4 input-group input-group-lg"> 
                        <span class="input-group-text"><i class="bi bi-person-circle"></i></span>
                        <input type="text" class="form-control" id="usuario" placeholder="Usuario" required>
                    </div>
                    
                    <div class="mb-4 input-group input-group-lg"> 
                        <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                        <input type="password" class="form-control" id="password" placeholder="Contraseña" required>
                        
                        <span class="input-group-text password-toggle" id="togglePassword">
                            <i class="bi bi-eye-slash-fill"></i>
                        </span>
                    </div>
                    
                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-login btn-lg"> 
                            Iniciar Sesión
                            <i class="bi bi-arrow-right-short"></i>
                        </button>
                    </div>
                    
                    <div class="text-center mt-3">
                        <a href="recuperar_contraseña.html" class="forgot-link">¿Olvidaste tu contraseña?</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <script src="js/login_personal.js"></script>
</body>
</html>
