<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TUCSA - Vista Camión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous">
    <link rel="icon" href="https://cdn-icons-png.freepik.com/512/10867/10867366.png">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="css/camion_mapa.css">
    <script src="js/config_global.js"></script>
</head>
<body class="fullscreen-mode">
    <main class="main-content">
        <div class="container-fluid h-100 p-3">
            <div class="row h-100 g-3">
                <!-- Panel lateral izquierdo -->
                <div class="col-12 col-lg-3 d-flex flex-column">
                    <!-- Encabezado compacto -->
                    <div class="info-card info-card-primary compact-header mb-3">
                        <div class="card-content text-center logo">
                            <i class="fa-solid fa-bus"></i>
                            <h3 class="mb-1">TUCSA</h3>
                            <p class="mb-0" style="font-size: 0.9rem;">Panel de Control</p>
                        </div>
                    </div>

                    <!-- Información del camión CON SELECTOR DE RUTA INTEGRADO -->
                    <div class="info-card info-card-secondary mb-3">
                        <div class="card-content">
                            <div class="d-flex justify-content-between align-items-center mb-3">
                                <h5 class="mb-0"><i class="fa-solid fa-bus me-2"></i>Camión</h5>
                                <select class="form-select form-select-sm w-auto" id="select-camion">
                                    <option value="1">1</option>
                                    <option value="2">2</option>
                                    <option value="3">3</option>
                                    <option value="4">4</option>
                                    <option value="5">5</option>
                                </select>
                            </div>
                            
                            <!-- Selector de ruta integrado -->
                            <div class="mb-3">
                                <label class="form-label small mb-1"><i class="fa-solid fa-route me-1"></i>Ruta Actual</label>
                                <select class="form-select form-select-sm" id="select-ruta">
                                    <option value="">Selecciona ruta</option>
                                    <option value="ruta-18">Ruta 18 - Centro/Universidad</option>
                                    <option value="ruta-25">Ruta 25 - Mercado/Terminal</option>
                                    <option value="ruta-32">Ruta 32 - Norte/Sur</option>
                                    <option value="ruta-45">Ruta 45 - Este/Oeste</option>
                                </select>
                            </div>
                            
                            <div class="info-grid-compact">
                                <div class="info-item-mini">
                                    <span class="info-label">Velocidad:</span>
                                    <span class="info-value" id="velocidad-actual">0 km/h</span>
                                </div>
                                <div class="info-item-mini">
                                    <span class="info-label">Tiempo:</span>
                                    <span class="info-value" id="tiempo-actual">--:--</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Próximas paradas - OCUPA TODO EL ESPACIO DISPONIBLE -->
                    <div class="info-card info-card-secondary flex-grow-1">
                        <div class="card-content h-100 d-flex flex-column">
                            <h5 class="mb-2"><i class="fa-solid fa-map-marker-alt me-2"></i>Próximas Paradas</h5>
                            <div id="proximas-paradas" class="flex-grow-1 paradas-expandidas">
                                <p class="text-muted small">Selecciona una ruta para ver las paradas</p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Mapa -->
                <div class="col-12 col-lg-9">
                    <div class="info-card info-card-secondary h-100">
                        <div class="card-content p-0 h-100">
                            <div class="map-frame h-100" id="map"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
    <script src="js/camion_mapa.js"></script>
</body>
</html>
