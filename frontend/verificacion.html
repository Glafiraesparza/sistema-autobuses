<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificación de Cuenta - Sistema de Autobuses</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" href="https://cdn-icons-png.freepik.com/512/10867/10867366.png">
    <link rel="stylesheet" href="css/inicio_sesion.css">
    <script src="js/config_global.js"></script>
</head>
<body>
    <!-- Botón para regresar -->
    <a href="inicio_sesion.html" class="back-button" title="Volver al Inicio de Sesión">
        <i class="fa-solid fa-arrow-left"></i>
        <span>Volver</span>
    </a>
    <div class="login-container">
        <div class="card login-card shadow-lg">
            <div class="card-body">
                <h2 class="card-title text-center mb-4">
                    <i class="bi bi-shield-check bus-icon"></i>
                    Verificación Requerida
                </h2>

                <div class="alert alert-info mb-4">
                    <i class="bi bi-info-circle-fill"></i>
                    Es tu primer inicio de sesión. Revisa tu correo electrónico para obtener el código de verificación.
                </div>

                <form id="verificacionForm">
                    <input type="hidden" id="email" value="">
                    
                    <div class="mb-4">
                        <label for="codigo_verificacion" class="form-label">Código de Verificación de 6 dígitos</label>
                        <div class="input-group input-group-lg">
                            <span class="input-group-text"><i class="bi bi-key-fill"></i></span>
                            <input type="text" class="form-control text-center" id="codigo_verificacion" 
                                placeholder="123456" maxlength="6" pattern="[0-9]{6}" required>
                        </div>
                        <div class="form-text">
                            Ingresa el código de 6 dígitos que recibiste en tu correo electrónico.
                        </div>
                    </div>
                    
                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-login btn-lg"> 
                            Verificar y Continuar
                            <i class="bi bi-check-circle-fill"></i>
                        </button>
                    </div>
                    
                    <div class="text-center mt-3">
                        <a href="#" id="reenviarCodigo" class="forgot-link">¿No recibiste el código? Reenviar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="js/verificacion.js"></script>
</body>
</html>
