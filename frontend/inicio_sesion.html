<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de Sesión - Autobuses</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="icon" href="https://cdn-icons-png.freepik.com/512/10867/10867366.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="js/config_global.js"></script>
    <link rel="stylesheet" href="css/inicio_sesion.css"> 
</head>
<body>

    <div class="login-container">
        <div class="card login-card shadow-lg">
            <div class="card-body">
                <h2 class="card-title text-center mb-4">
                    <i class="bi bi-bus-front-fill bus-icon"></i>
                    Iniciar Sesión
                </h2>

                <form>
                    <div class="mb-4 input-group input-group-lg"> 
                        <span class="input-group-text"><i class="bi bi-person-circle"></i></span>
                        <input type="text" class="form-control" id="usuario" placeholder="Correo Electronico" required>
                    </div>
                    
                    <div class="mb-4 input-group input-group-lg"> 
                        <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                        <input type="password" class="form-control" id="password" placeholder="Contraseña" required>
                        
                        <span class="input-group-text password-toggle" id="togglePassword">
                            <i class="bi bi-eye-slash-fill"></i>
                        </span>
                    </div>
                    
                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-login btn-lg"> 
                            Acceder
                            <i class="bi bi-arrow-right-short"></i>
                        </button>
                    </div>
                    
                    <div class="text-center mt-3">
                        <a href="recuperar_contraseña.html" class="forgot-link">¿Olvidaste tu contraseña?</a>
                        <span class="text-muted separator-text">|</span>
                        <a href="registro_cuenta.html" class="forgot-link">Crear cuenta</a>
                    </div>
                </form>

                <!-- Nuevo enlace agregado -->
                <div class="text-center mt-4">
                    <a href="https://localhost:8000/inicio_sesion_personal_TUCSA.html" class="personal-link" style="color: #d3d3d3 !important;">
                        Iniciar sesión como personal
                    </a>
                </div>
            </div>
        </div>
    </div>
    <script src="js/inicio_sesion.js"></script>
</body>
</html>
