<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restablecer Contraseña - Autobuses</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" href="https://cdn-icons-png.freepik.com/512/10867/10867366.png">
    <link rel="stylesheet" href="css/inicio_sesion.css"> 
    <script src="js/config_global.js"></script>
</head>
<body>

    <div class="login-container">
        <div class="card login-card shadow-lg">
            <div class="card-body">
                <h2 class="card-title text-center mb-4">
                    <i class="bi bi-key-fill bus-icon"></i>
                    Restablecer Contraseña
                </h2>

                <p class="text-center text-muted mb-4">
                    Ingresa el código que recibiste por correo y tu nueva contraseña.
                </p>

                <form id="restablecerForm">
                    <input type="hidden" id="email" value="">
                    
                    <div class="mb-4">
                        <label for="codigo_recuperacion" class="form-label">Código de Recuperación</label>
                        <div class="input-group input-group-lg">
                            <span class="input-group-text"><i class="bi bi-shield-check"></i></span>
                            <input type="text" class="form-control text-center" id="codigo_recuperacion" 
                                   placeholder="ABCD1234" maxlength="8" required>
                        </div>
                        <div class="form-text">
                            Ingresa el código de 8 caracteres que recibiste en tu correo electrónico.
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="nueva_password" class="form-label">Nueva Contraseña</label>
                        <div class="input-group input-group-lg">
                            <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                            <input type="password" class="form-control" id="nueva_password" 
                                   placeholder="Mínimo 8 caracteres" required>
                            <span class="input-group-text password-toggle" id="toggleNuevaPassword">
                                <i class="bi bi-eye-slash-fill"></i>
                            </span>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="confirmar_password" class="form-label">Confirmar Nueva Contraseña</label>
                        <div class="input-group input-group-lg">
                            <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                            <input type="password" class="form-control" id="confirmar_password" 
                                placeholder="Confirma tu contraseña" required>
                            <span class="input-group-text password-toggle" id="toggleConfirmarPassword">
                                <i class="bi bi-eye-slash-fill"></i>
                            </span>
                        </div>
                    </div>
                    
                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-login btn-lg"> 
                            Restablecer Contraseña
                            <i class="bi bi-check-circle-fill"></i>
                        </button>
                    </div>
                    
                    <div class="text-center mt-3">
                        <a href="#" id="reenviarCodigo" class="forgot-link">¿No recibiste el código? Reenviar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="js/restablecer_contraseña.js"></script>
</body>
</html>
